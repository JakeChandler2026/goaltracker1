<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Tracker Test Harness</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    .pass {
      color: #0f7a45;
    }

    .fail {
      color: #b42318;
    }
  </style>
</head>
<body>
  <h1>Goal Tracker Tests</h1>
  <div id="results">Running...</div>
  <iframe id="appFrame" src="./demo-test-app.html" style="width:1280px;height:2200px;border:0;"></iframe>

  <script>
    const results = document.getElementById("results");
    const frame = document.getElementById("appFrame");
    let hasRun = false;
    let lastAlertMessage = "";

    function assert(condition, message) {
      const line = document.createElement("div");
      line.className = condition ? "pass" : "fail";
      line.textContent = `${condition ? "PASS" : "FAIL"}: ${message}`;
      results.appendChild(line);

      if (!condition) {
        throw new Error(message);
      }
    }

    function click(element) {
      element.dispatchEvent(new MouseEvent("click", { bubbles: true }));
    }

    function change(element) {
      element.dispatchEvent(new Event("change", { bubbles: true }));
    }

    function submit(element) {
      if (typeof element.requestSubmit === "function") {
        element.requestSubmit();
        return;
      }

      element.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
    }

    function dragBefore(win, source, target) {
      const dataTransfer = new win.DataTransfer();
      source.dispatchEvent(new win.DragEvent("dragstart", { bubbles: true, dataTransfer }));
      target.dispatchEvent(new win.DragEvent("dragover", { bubbles: true, cancelable: true, dataTransfer, clientY: target.getBoundingClientRect().top }));
      target.dispatchEvent(new win.DragEvent("drop", { bubbles: true, cancelable: true, dataTransfer }));
      source.dispatchEvent(new win.DragEvent("dragend", { bubbles: true, dataTransfer }));
    }

    async function openGoalEditor(doc, card) {
      click(Array.from(card.querySelectorAll("button")).find((button) => button.textContent.includes("Edit Goal")));
      await waitFor(() => Boolean(doc.querySelector(".goal-editor-overlay")));
      return doc.querySelector(".goal-editor-overlay");
    }

    async function openAdminView(doc, label) {
      const button = Array.from(doc.querySelectorAll("[data-admin-view]")).find((item) => item.textContent.includes(label));
      assert(Boolean(button), `Admin navigation includes ${label}`);
      click(button);
      await new Promise((resolve) => setTimeout(resolve, 150));
    }

    function addDays(dateString, days) {
      const date = new Date(`${dateString}T00:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    async function waitFor(condition, timeoutMs = 10000, intervalMs = 100) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (condition()) {
          return;
        }
        await new Promise((resolve) => setTimeout(resolve, intervalMs));
      }

      throw new Error("Timed out waiting for app state");
    }

        if (hasRun) {

        }
        hasRun = true;
        await new Promise((resolve) => setTimeout(resolve, 400));

        await new Promise((resolve) => setTimeout(resolve, 250));
