<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Tracker Test Harness</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    .pass {
      color: #0f7a45;
    }

    .fail {
      color: #b42318;
    }
  </style>
</head>
<body>
  <h1>Goal Tracker Tests</h1>
  <div id="results">Running...</div>
  <iframe id="appFrame" src="./demo-test-app.html" style="width:1280px;height:2200px;border:0;"></iframe>

  <script>
    const results = document.getElementById("results");
    const frame = document.getElementById("appFrame");
    let hasRun = false;
    let lastAlertMessage = "";

    function assert(condition, message) {
      const line = document.createElement("div");
      line.className = condition ? "pass" : "fail";
      line.textContent = `${condition ? "PASS" : "FAIL"}: ${message}`;
      results.appendChild(line);

      if (!condition) {
        throw new Error(message);
      }
    }

    function click(element) {
      element.dispatchEvent(new MouseEvent("click", { bubbles: true }));
    }

    function change(element) {
      element.dispatchEvent(new Event("change", { bubbles: true }));
    }

    function submit(element) {
      if (typeof element.requestSubmit === "function") {
        element.requestSubmit();
        return;
      }

      element.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
    }

    function addDays(dateString, days) {
      const date = new Date(`${dateString}T00:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    async function waitFor(condition, timeoutMs = 10000, intervalMs = 100) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (condition()) {
          return;
        }
        await new Promise((resolve) => setTimeout(resolve, intervalMs));
      }

      throw new Error("Timed out waiting for app state");
    }

    frame.addEventListener("load", async () => {
      try {
        if (hasRun) {
          return;
        }
        hasRun = true;
        await new Promise((resolve) => setTimeout(resolve, 400));

        const win = frame.contentWindow;
        win.alert = (message) => {
          lastAlertMessage = String(message || "");
        };

        win.localStorage.removeItem("bishop-goal-tracker-state-v1");
        win.localStorage.removeItem("demo-local:bishop-goal-tracker-state-v1");
        win.localStorage.removeItem("supabase-staging:bishop-goal-tracker-state-v1");
        win.location.reload();
        await new Promise((resolve) => {
          frame.addEventListener("load", () => setTimeout(resolve, 400), { once: true });
        });
        await new Promise((resolve) => setTimeout(resolve, 400));

        const reloadedDoc = frame.contentDocument;
        frame.contentWindow.alert = (message) => {
          lastAlertMessage = String(message || "");
        };

        assert(reloadedDoc.getElementById("loginForm") !== null, "Login form renders");
        await waitFor(() => {
          const title = reloadedDoc.getElementById("dashboardTitle")?.textContent || "";
          return title.includes("Choose a login") || title.includes("Something went wrong");
        });
        assert(reloadedDoc.getElementById("dashboardTitle").textContent.includes("Choose a login"), "Logged-out dashboard state renders");

        reloadedDoc.getElementById("username").value = "josh@example.com";
        reloadedDoc.getElementById("password").value = "goal123";
        submit(reloadedDoc.getElementById("loginForm"));

        await waitFor(() => {
          const sessionTitle = reloadedDoc.getElementById("sessionTitle")?.textContent || "";
          return sessionTitle.includes("Josh Carter") || Boolean(lastAlertMessage);
        }, 3000);
        assert(
          reloadedDoc.getElementById("sessionTitle").textContent.includes("Josh Carter"),
          `User login succeeds${lastAlertMessage ? ` (${lastAlertMessage})` : ""}`
        );
        assert(reloadedDoc.getElementById("userDashboard").children.length >= 2, "User dashboard renders goals");

        reloadedDoc.getElementsByName("goalTitle")[0].value = "Scripture Study Goal";
        reloadedDoc.getElementsByName("goalSummary")[0].value = "Build a consistent weekly study habit.";
        reloadedDoc.getElementsByName("newSubGoalTitle")[0].value = "Read daily";
        reloadedDoc.getElementsByName("newSubGoalRepeatCount")[0].value = "3";
        click(reloadedDoc.getElementById("addGoalChecklistItemButton"));
        reloadedDoc.getElementsByName("newSubGoalTitle")[0].value = "Write notes";
        reloadedDoc.getElementsByName("newSubGoalRepeatCount")[0].value = "1";
        click(reloadedDoc.getElementById("addGoalChecklistItemButton"));
        submit(reloadedDoc.getElementById("addGoalForm"));

        await new Promise((resolve) => setTimeout(resolve, 250));

        const goalTitles = Array.from(reloadedDoc.querySelectorAll(".goal-title")).map((node) => node.textContent);
        assert(goalTitles.includes("Scripture Study Goal"), "New goal creation works");

        const newestGoalCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        const checkboxes = newestGoalCard.querySelectorAll(".checklist-track input[type='checkbox']");
        checkboxes[0].checked = true;
        change(checkboxes[0]);
        await new Promise((resolve) => setTimeout(resolve, 150));
        const updatedCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        const updatedCheckboxes = updatedCard.querySelectorAll(".checklist-track input[type='checkbox']");
        assert(Boolean(updatedCheckboxes[0].dataset.completedDate), "A completed checkbox stores its completion date");
        updatedCheckboxes[1].checked = true;
        change(updatedCheckboxes[1]);
        await new Promise((resolve) => setTimeout(resolve, 150));
        const thirdCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        const thirdCheckboxes = thirdCard.querySelectorAll(".checklist-track input[type='checkbox']");
        thirdCheckboxes[2].checked = true;
        change(thirdCheckboxes[2]);
        await new Promise((resolve) => setTimeout(resolve, 150));
        const fourthCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        const fourthCheckboxes = fourthCard.querySelectorAll(".checklist-track input[type='checkbox']");
        fourthCheckboxes[3].checked = true;
        change(fourthCheckboxes[3]);
        await new Promise((resolve) => setTimeout(resolve, 250));

        const readyCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(readyCard.querySelector(".progress-value").textContent === "100%", "Overall goal progress reaches 100%");
        assert(readyCard.querySelector(".goal-status").textContent.includes("Pending Youth leader sign-off"), "Completed goal waits for leader approval");

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("leaderTab"));
        reloadedDoc.getElementById("username").value = "leader.one@example.com";
        reloadedDoc.getElementById("password").value = "approve789";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        assert(reloadedDoc.getElementById("sessionTitle").textContent.includes("Brother Jensen"), "Leader login succeeds");
        const visibleLeaderGoalTitles = Array.from(reloadedDoc.querySelectorAll(".goal-title")).map((node) => node.textContent);
        assert(!visibleLeaderGoalTitles.includes("Temple Family History Goal"), "Young Men leader cannot see Young Women goals");
        const leaderGoalCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(Boolean(leaderGoalCard), "Leader can see the completed goal");
        assert(
          leaderGoalCard.querySelector(".subgoal-meta").textContent.includes("Last checked on"),
          "Leaders can see the completion date for checked checklist items"
        );
        const approveButton = Array.from(leaderGoalCard.querySelectorAll("button")).find((button) =>
          button.textContent.includes("Approve Goal")
        );
        assert(
          Boolean(approveButton) && !approveButton.disabled,
          `Leader can approve completed goal (progress=${leaderGoalCard.querySelector(".progress-value")?.textContent || "missing"}, status=${leaderGoalCard.querySelector(".goal-status")?.textContent || "missing"}, buttons=${leaderGoalCard.querySelectorAll("button").length})`
        );
        click(approveButton);
        await new Promise((resolve) => setTimeout(resolve, 250));

        const approvedCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(
          approvedCard.querySelector(".goal-status").textContent.includes("Approved"),
          `Leader approval updates goal status (status=${approvedCard.querySelector(".goal-status")?.textContent || "missing"})`
        );
        const undoLatestCheckButton = Array.from(approvedCard.querySelectorAll("button")).find((button) =>
          button.textContent.includes("Undo Latest Check")
        );
        assert(Boolean(undoLatestCheckButton), "Leader can reopen a goal by undoing the latest completed checkbox");
        click(undoLatestCheckButton);
        await new Promise((resolve) => setTimeout(resolve, 250));

        const reopenedCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(reopenedCard.querySelector(".progress-value").textContent === "75%", "Leader undo reopens the goal by lowering progress");
        assert(
          reopenedCard.querySelector(".goal-status").textContent.includes("In progress"),
          "Leader undo clears the approved state"
        );
        const today = new Date().toISOString().slice(0, 10);
        const yesterday = addDays(today, -1);
        const extensionDate = addDays(today, 10);
        reopenedCard.querySelector("input[name='editGoalDeadline']").value = yesterday;
        submit(reopenedCard.querySelector("form"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const overdueLeaderCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(overdueLeaderCard.querySelector(".goal-status").textContent.includes("Deadline passed"), "Past-deadline goals close automatically");
        assert(
          Boolean(Array.from(overdueLeaderCard.querySelectorAll("button")).find((button) => button.textContent.includes("Approve Extension"))),
          "Leaders are prompted to approve an extension for overdue goals"
        );

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("userTab"));
        reloadedDoc.getElementById("username").value = "josh@example.com";
        reloadedDoc.getElementById("password").value = "goal123";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const overdueYouthCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(
          overdueYouthCard.querySelector(".goal-status").textContent.includes("Deadline passed"),
          "Youth can see that an overdue goal is closed"
        );
        assert(
          Array.from(overdueYouthCard.querySelectorAll(".checklist-track input[type='checkbox']")).every((checkbox) => checkbox.disabled),
          "Youth cannot keep checking boxes after the deadline passes"
        );

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("leaderTab"));
        reloadedDoc.getElementById("username").value = "leader.one@example.com";
        reloadedDoc.getElementById("password").value = "approve789";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const extensionCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        extensionCard.querySelector("input[name='extensionDeadline']").value = extensionDate;
        submit(Array.from(extensionCard.querySelectorAll("form")).find((form) => form.elements.extensionDeadline));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const extendedCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        assert(
          extendedCard.querySelector(".goal-status").textContent.includes("In progress"),
          "Approving an extension reopens the overdue goal"
        );
        assert(
          extendedCard.querySelector(".goal-deadline").textContent.includes(extensionDate.slice(0, 4)) || extendedCard.querySelector(".goal-deadline").textContent.includes("Deadline:"),
          "The new deadline is shown on the goal"
        );

        const leaderOrgSelect = reloadedDoc.querySelector("#createYouthAccountForm select[name='youthOrganization']");
        assert(leaderOrgSelect.options.length === 1 && leaderOrgSelect.value === "young_men", "Young Men leader can only create Young Men youth accounts");

        reloadedDoc.querySelector("#createManagedGoalForm select[name='targetYouthId']").value = "u1";
        reloadedDoc.querySelector("#createManagedGoalForm input[name='goalTitle']").value = "Leader Assigned Goal";
        reloadedDoc.querySelector("#createManagedGoalForm textarea[name='goalSummary']").value = "Assigned by a Youth leader.";
        reloadedDoc.querySelector("#createManagedGoalForm input[name='newSubGoalTitle']").value = "Attend planning meeting";
        reloadedDoc.querySelector("#createManagedGoalForm input[name='newSubGoalRepeatCount']").value = "2";
        click(reloadedDoc.getElementById("addManagedGoalChecklistItemButton"));
        submit(reloadedDoc.getElementById("createManagedGoalForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        let adminGoalCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Leader Assigned Goal"
        );
        assert(Boolean(adminGoalCard), "Leader can create a goal directly for youth");

        adminGoalCard.querySelector("input[name='editGoalTitle']").value = "Leader Assigned Goal Updated";
        adminGoalCard.querySelector("textarea[name='editGoalSummary']").value = "Updated by a Youth leader.";
        submit(adminGoalCard.querySelector("form"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        adminGoalCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Leader Assigned Goal Updated"
        );
        assert(Boolean(adminGoalCard), "Leader can edit an existing youth goal");
        click(Array.from(adminGoalCard.querySelectorAll("button")).find((button) => button.textContent.includes("Make Template")));
        await new Promise((resolve) => setTimeout(resolve, 250));

        let createdTemplateCard = Array.from(reloadedDoc.querySelectorAll(".template-grid .form-card")).find((card) =>
          card.querySelector("h3").textContent === "Leader Assigned Goal Updated"
        );
        assert(Boolean(createdTemplateCard), "Leader can turn a goal into a template");

        createdTemplateCard.querySelector("input[name='editTemplateTitle']").value = "Leader Template Updated";
        createdTemplateCard.querySelector("textarea[name='editTemplateSummary']").value = "Updated template summary.";
        submit(createdTemplateCard.querySelector("form"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        createdTemplateCard = Array.from(reloadedDoc.querySelectorAll(".template-grid .form-card")).find((card) =>
          card.querySelector("h3").textContent === "Leader Template Updated"
        );
        assert(Boolean(createdTemplateCard), "Leader can edit an existing template");

        reloadedDoc.getElementsByName("youthName")[0].value = "Caleb Young";
        reloadedDoc.getElementsByName("youthEmail")[0].value = "caleb@example.com";
        reloadedDoc.getElementsByName("youthOrganization")[0].value = "young_men";
        reloadedDoc.getElementsByName("youthPassword")[0].value = "welcome123";
        submit(reloadedDoc.getElementById("createYouthAccountForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        adminGoalCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Leader Assigned Goal Updated"
        );
        const copyTargetSelect = adminGoalCard.querySelector("select[name='copyGoalTarget']");
        copyTargetSelect.value = Array.from(copyTargetSelect.options).find((option) => option.textContent.includes("Caleb Young")).value;
        change(copyTargetSelect);
        click(Array.from(adminGoalCard.querySelectorAll("button")).find((button) => button.textContent.includes("Copy Goal")));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const templateCards = reloadedDoc.querySelectorAll(".template-grid .form-card");
        assert(templateCards.length >= 2, "Leader can see goal templates");
        click(Array.from(reloadedDoc.querySelectorAll(".template-list-item")).find((button) =>
          button.textContent.includes("Daily Scripture Habit")
        ));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const scriptureTemplateCard = Array.from(reloadedDoc.querySelectorAll(".template-grid .form-card")).find((card) =>
          card.querySelector("h3")?.textContent === "Daily Scripture Habit"
        );
        assert(Boolean(scriptureTemplateCard), "Leader can open an existing template from the list");
        const templateUserSelect = scriptureTemplateCard.querySelector(".template-user-select");
        templateUserSelect.value = "u1";
        change(templateUserSelect);
        click(Array.from(scriptureTemplateCard.querySelectorAll("button")).find((button) => button.textContent.includes("Copy Goal To Youth")));
        await new Promise((resolve) => setTimeout(resolve, 250));

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("userTab"));
        reloadedDoc.getElementById("username").value = "josh@example.com";
        reloadedDoc.getElementById("password").value = "goal123";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const youthGoalTitles = Array.from(reloadedDoc.querySelectorAll(".goal-title")).map((node) => node.textContent);
        assert(youthGoalTitles.includes("Daily Scripture Habit"), "Assigned template appears in the target youth's goals");
        assert(youthGoalTitles.includes("Leader Assigned Goal Updated"), "Leader-created goal appears for the target youth");
        const reopenedYouthCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        const reopenedYouthCheckboxes = reopenedYouthCard.querySelectorAll(".checklist-track input[type='checkbox']");
        reopenedYouthCheckboxes[0].checked = false;
        change(reopenedYouthCheckboxes[0]);
        await new Promise((resolve) => setTimeout(resolve, 250));

        const youthUndoCard = Array.from(reloadedDoc.querySelectorAll(".goal-card")).find((card) =>
          card.querySelector(".goal-title").textContent === "Scripture Study Goal"
        );
        const youthUndoCheckboxes = youthUndoCard.querySelectorAll(".checklist-track input[type='checkbox']");
        assert(!youthUndoCheckboxes[0].checked, "Youth can undo an accidental checkbox click");
        assert(youthUndoCheckboxes[0].dataset.completedDate === "", "Undo clears the saved completion date");

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("leaderTab"));
        click(reloadedDoc.getElementById("createAccountModeButton"));
        reloadedDoc.getElementById("registerName").value = "New Leader";
        reloadedDoc.getElementById("registerEmail").value = "new.leader@example.com";
        reloadedDoc.getElementById("registerWard").value = "Mapleton 1st Ward";
        reloadedDoc.getElementById("registerOrganization").value = "young_men";
        reloadedDoc.getElementById("registerPassword").value = "simplepass";
        submit(reloadedDoc.getElementById("registerForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        assert(!reloadedDoc.getElementById("loginView").classList.contains("hidden"), "New Youth leader account stays pending instead of signing in");

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("bishopTab"));
        click(reloadedDoc.getElementById("createAccountModeButton"));
        reloadedDoc.getElementById("registerName").value = "Bishop Self Signup";
        reloadedDoc.getElementById("registerEmail").value = "bishop.self@example.com";
        reloadedDoc.getElementById("registerWard").value = "Mapleton 1st Ward";
        reloadedDoc.getElementById("registerPassword").value = "bishoppass";
        submit(reloadedDoc.getElementById("registerForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        assert(reloadedDoc.getElementById("sessionTitle").textContent.includes("Bishop Self Signup"), "Bishop can self-sign up");

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("bishopTab"));
        reloadedDoc.getElementById("username").value = "ward.bishop@example.com";
        reloadedDoc.getElementById("password").value = "steward123";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        const bishopTitles = Array.from(reloadedDoc.querySelectorAll(".goal-title")).map((node) => node.textContent);
        assert(bishopTitles.includes("Temple Family History Goal"), "Bishop can see youth goals across both organizations in the ward");
        assert(bishopTitles.includes("Leader Assigned Goal Updated"), "Bishop can also see goals created by Youth leaders");
        const bishopOrgSelect = reloadedDoc.querySelector("#createYouthAccountForm select[name='youthOrganization']");
        assert(bishopOrgSelect.options.length === 2, "Bishop can create youth accounts in both organizations");

        const approveLeaderButton = Array.from(reloadedDoc.querySelectorAll("button")).find((button) => button.textContent.includes("Approve Youth Leader"));
        assert(Boolean(approveLeaderButton), "Bishop can see pending Youth leader accounts");
        click(approveLeaderButton);
        await new Promise((resolve) => setTimeout(resolve, 250));

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("leaderTab"));
        reloadedDoc.getElementById("username").value = "new.leader@example.com";
        reloadedDoc.getElementById("password").value = "simplepass";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        assert(reloadedDoc.getElementById("sessionTitle").textContent.includes("New Leader"), "Approved Youth leader can sign in");

        results.insertAdjacentHTML("afterbegin", "<strong>All browser tests passed.</strong>");
      } catch (error) {
        const line = document.createElement("div");
        line.className = "fail";
        line.textContent = `FAIL: ${error.message}`;
        results.appendChild(line);
      }
    });
  </script>
</body>
</html>
